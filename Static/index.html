<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #question {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #question:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .controls label {
            font-weight: 600;
            color: #4a5568;
        }

        .controls input {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            width: 80px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .answer-section {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .answer-section h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .answer-text {
            color: #4a5568;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .sources-section h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .source-item {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #48bb78;
        }

        .source-file {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .source-snippet {
            color: #718096;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #e6fffa;
            border-radius: 8px;
            font-size: 14px;
            color: #234e52;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c53030;
            display: none;
        }

        .error.active {
            display: block;
        }

        .quick-questions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quick-btn {
            padding: 8px 16px;
            background: #edf2f7;
            border: 1px solid #cbd5e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="quick-questions">
                <button class="quick-btn" onclick="setQuestion('Какие ошибки ERROR или Exception встречаются в логах?')">Ошибки в логах</button>
                <button class="quick-btn" onclick="setQuestion('Найди все попытки неудачного входа (failed login)')">Неудачные входы</button>
                <button class="quick-btn" onclick="setQuestion('Есть ли признаки SQL-инъекций или XSS атак?')">Атаки SQL/XSS</button>
                <button class="quick-btn" onclick="setQuestion('Какие IP-адреса проявляют подозрительную активность?')">Подозрительные IP</button>
                <button class="quick-btn" onclick="setQuestion('Проанализируй логи на признаки компрометации учетных записей')">Компрометация аккаунтов</button>
            </div>

            <div class="input-section">
                <input type="text" id="question" placeholder="Задайте вопрос по логам безопасности..." />
                <button class="btn btn-primary" id="submitBtn" onclick="submitQuery()">
                    <span>🔎</span> Анализировать
                </button>
            </div>

            <div class="controls">
                <label for="topK">Найти фрагментов:</label>
                <input type="number" id="topK" value="5" min="1" max="20" />
                <button class="btn btn-secondary" onclick="reloadIndex()">
                    <span>🔄</span> Перезагрузить логи
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Анализирую логи... Это может занять несколько секунд</p>
            </div>

            <div class="error" id="error"></div>

            <div class="results" id="results">
                <div class="answer-section">
                    <h3>📊 Результат анализа</h3>
                    <div class="answer-text" id="answer"></div>
                </div>

                <div class="sources-section">
                    <h3>📁 Источники информации</h3>
                    <div id="sources"></div>
                </div>

                <div class="stats" id="stats"></div>
            </div>
        </div>
    </div>

    <script>
        function setQuestion(text) {
            document.getElementById('question').value = text;
        }

        async function submitQuery() {
            const question = document.getElementById('question').value.trim();
            const topK = parseInt(document.getElementById('topK').value);

            if (!question) {
                showError('Пожалуйста, введите вопрос');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');

            // Скрываем предыдущие результаты и ошибки
            results.classList.remove('active');
            error.classList.remove('active');
            
            // Показываем индикатор загрузки
            loading.classList.add('active');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: topK
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Ошибка сервера');
                }

                const data = await response.json();
                displayResults(data);

            } catch (err) {
                showError('Ошибка: ' + err.message);
            } finally {
                loading.classList.remove('active');
                submitBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const results = document.getElementById('results');
            const answer = document.getElementById('answer');
            const sources = document.getElementById('sources');
            const stats = document.getElementById('stats');

            // Отображаем ответ
            answer.textContent = data.answer;

            // Отображаем источники
            sources.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach(source => {
                    const sourceDiv = document.createElement('div');
                    sourceDiv.className = 'source-item';
                    sourceDiv.innerHTML = `
                        <div class="source-file">📄 ${source.file}</div>
                        <div class="source-snippet">${escapeHtml(source.snippet)}</div>
                    `;
                    sources.appendChild(sourceDiv);
                });
            } else {
                sources.innerHTML = '<p style="color: #718096;">Источники не найдены</p>';
            }

            // Отображаем статистику
            if (data.stats) {
                stats.innerHTML = `
                    <div class="stat-item">
                        <span class="stat-label">Входных токенов</span>
                        <span class="stat-value">${data.stats.input_tokens || 0}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Выходных токенов</span>
                        <span class="stat-value">${data.stats.total_output_tokens || 0}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Скорость</span>
                        <span class="stat-value">${(data.stats.tokens_per_second || 0).toFixed(1)} tok/s</span>
                    </div>
                `;
            }

            results.classList.add('active');
        }

        async function reloadIndex() {
            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Перезагрузка...';

            try {
                const response = await fetch('/reload', { method: 'POST' });
                if (!response.ok) {
                    throw new Error('Ошибка перезагрузки');
                }
                alert('✅ Логи успешно переиндексированы!');
            } catch (err) {
                showError('Ошибка перезагрузки: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🔄</span> Перезагрузить логи';
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter для отправки
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitQuery();
            }
        });
    </script>
</body>
</html>
